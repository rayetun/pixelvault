name: Update readme and assets

# Pushes readme.txt and the listing assets (banner, icon, screenshots) to SVN
# without cutting a new release. Useful for fixing typos, updating "Tested up to",
# or swapping banners/screenshots between releases.
on:
  push:
    branches:
      - main
    paths:
      - 'readme.txt'
      - '.wordpress-org/**'

jobs:
  assets:
    name: Update readme and assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update WordPress.org readme and assets
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: pixelvault
